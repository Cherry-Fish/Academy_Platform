spring:
  application:
    name: academy-platform-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/academy}
    username: ${DB_USERNAME:academy}
    password: ${DB_PASSWORD:academy}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8081

logging:
  level:
    org.springframework.security: INFO

mattermost:
  api-url: http://hyunssoo.asuscomm.com:8065/api/v4
  admin-token: ${MATTERMOST_ADMIN_TOKEN:}

security:
  jwt:
    secret: ${JWT_SECRET:academy-platform-development-secret-key-change-me-2026}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

